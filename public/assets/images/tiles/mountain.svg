<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- dark sky/base -->
  <rect width="16" height="16" fill="#0c0c10"/>
  <!-- ground line -->
  <rect x="0" y="13" width="16" height="3" fill="#141418"/>
  <!-- secondary peak (left) -->
  <polygon points="3,13 6,5 9,13" fill="#1a1a1e"/>
  <!-- main peak -->
  <polygon points="8,13 11,1 14,13" fill="#1e1e24"/>
  <!-- snow cap on main peak -->
  <polygon points="11,1 13,6 11,5 9,6" fill="#cccccc" opacity="0.3"/>
  <!-- rock face detail lines -->
  <line x1="11" y1="1" x2="9" y2="9" stroke="#28282e" stroke-width="0.5"/>
  <line x1="11" y1="1" x2="13" y2="8" stroke="#28282e" stroke-width="0.5"/>
  <line x1="6" y1="5" x2="4.5" y2="10" stroke="#222228" stroke-width="0.5"/>
  <!-- peak highlight -->
  <line x1="11" y1="2" x2="10" y2="5" stroke="#3a3a44" stroke-width="0.7" opacity="0.8"/>
</svg>
