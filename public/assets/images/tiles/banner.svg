<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- wall background -->
  <rect width="16" height="16" fill="#090705"/>
  <rect x="0" y="0" width="10" height="5" fill="#1c1510"/>
  <rect x="12" y="0" width="4" height="5" fill="#1c1510"/>
  <rect x="0" y="6" width="4" height="5" fill="#181210"/>
  <rect x="6" y="6" width="10" height="5" fill="#181210"/>
  <rect x="0" y="12" width="10" height="4" fill="#1c1510"/>
  <rect x="12" y="12" width="4" height="4" fill="#1c1510"/>
  <!-- banner rod -->
  <rect x="3" y="1" width="10" height="1.5" fill="#5a4020"/>
  <!-- banner cloth (tapered at bottom) -->
  <polygon points="4,2.5 12,2.5 12,13 8,15 4,13" fill="#7a1a1a"/>
  <!-- banner left shadow -->
  <polygon points="4,2.5 5,2.5 5,12.5 4,13" fill="#4a0a0a" opacity="0.6"/>
  <!-- gold emblem (chevron) -->
  <polygon points="8,6 11,9 8,8 5,9" fill="#c09840"/>
  <!-- rod end caps -->
  <circle cx="3" cy="1.75" r="1" fill="#6a5028"/>
  <circle cx="13" cy="1.75" r="1" fill="#6a5028"/>
</svg>
